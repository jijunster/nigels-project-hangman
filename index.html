<!doctype html>
<html lang="en">
	<head>
		<title>Project Hangman</title>
        <meta name="viewport" content="width=device-width,initial-scale=1">		
		<meta charset="utf-8">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

		<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">	
        
		<link rel="stylesheet" href="../nigels-project-hangman/css/style.css">
		<script src="../nigels-project-hangman/scripts/hangman.js" defer></script>		


	</head>
<body>
	<div id="wrapper">
		<header class="card">
			<h1>Project Hangman</h1>
		</header>

		<main>
			<section class="card">
				<p id="hint"></p>
				<p id="game-message"></p>

				<div id="word-display"></div>

				<img id="hangman-image" src="images/hangman-0.png" alt="hangman">

				<div id="letter-buttons"></div>

				<button id="play-again">
					Play Again
				</button>							
			</section>
		</main>
	</div>
</body>
</html>
